<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>OfferBuddy — 设置</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="options">
  <div class="shell">
    <header class="brand">
      <div class="wordmark">OfferBuddy<span class="dot">.</span></div>
      <div class="brand-line"><span></span></div>
    </header>

    <main class="options-card">
      <section>
        <p class="eyebrow">API</p>
        <label class="field">
          <span>厂商</span>
          <select id="provider"></select>
        </label>
        <label class="field">
          <span>Key</span>
          <div class="key-row">
            <input id="api-key" type="password" placeholder="sk-..." autocomplete="off">
            <button id="toggle-key" type="button" class="secondary">显示</button>
          </div>
          <span class="hint">仅存本机浏览器，按厂商分开保存</span>
        </label>
        <label class="field">
          <span>Base URL</span>
          <input id="base-url" type="text">
        </label>
        <label class="field">
          <span>模型</span>
          <input id="model" type="text" list="model-list">
          <datalist id="model-list"></datalist>
        </label>
        <div class="row">
          <button id="test" type="button" class="secondary">测试连接</button>
          <span id="test-status" class="status"></span>
        </div>
      </section>

      <section>
        <p class="eyebrow">简历</p>
        <textarea id="resume-md" rows="18" spellcheck="false" placeholder="Markdown 格式"></textarea>
      </section>

      <section>
        <p class="eyebrow">填写偏好</p>
        <textarea id="extra-instructions" rows="2" spellcheck="false" placeholder="可选，如：期望薪资填「面议」"></textarea>
      </section>
    </main>
  </div>

  <div class="save-bar">
    <div class="save-bar-inner">
      <button id="save" type="button" class="primary">保存</button>
      <span id="save-status" class="status"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
