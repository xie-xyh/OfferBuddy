<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="popup">
  <h1>AI 简历自动填写</h1>
  <button id="fill" class="primary" type="button">自动填写本页</button>
  <p id="status" class="status">在招聘页面点击按钮，插件会识别表单字段并调用大模型填写。</p>
  <button id="open-options" class="secondary" type="button">打开设置（API Key / 简历）</button>
  <p class="note">填充后字段会以绿框高亮，请逐项核对——插件不会替你提交表单。</p>
  <script src="popup.js"></script>
</body>
</html>
